# Starship prompt configuration

# Insert blank line between prompts
add_newline = true

# Left prompt - CC profile icon, directory
format = """
$custom\
$directory\
$line_break\
$character"""

# Right prompt - git info + PR number
right_format = """
${custom.gh_pr}\
$git_branch\
$git_status\
$git_state\
$cmd_duration"""

# GitHub PR number for current branch
[custom.gh_pr]
command = "gh pr view --json number -q .number 2>/dev/null"
when = "gh pr view --json number -q .number 2>/dev/null"
format = "[PR#$output ]($style)"
style = "cyan"

# Claude Code profile icon (reads symlink target)
[custom.cc_profile]
command = "case $(readlink ~/.claude) in *elicit*) echo 🔬;; *sociotechnica*) echo 🏗️;; *personal*) echo 🏠;; esac"
when = "test -L ~/.claude"
format = "[$output ]($style)"
style = ""

[character]
success_symbol = "[%](bold green)"
error_symbol = "[%](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
repo_root_style = "bold blue"
style = "blue"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style) "

[git_branch]
format = "[$branch]($style) "
style = "bold purple"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "yellow"
diverged = "↕"
behind = "📥"
ahead = "📤"
untracked = "🆕"
deleted = "␡"
modified = "✨"
renamed = "♻️"
stashed = "👻"
staged = "📦"
