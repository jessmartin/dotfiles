# Starship prompt configuration

# Insert blank line between prompts
add_newline = true

# Left prompt - CC profile icon, directory
format = """
$custom\
$directory\
$line_break\
$character"""

# Right prompt - git info
right_format = """
$git_branch\
$git_status\
$git_state\
$cmd_duration"""

# Claude Code profile icon
[custom.cc_profile]
command = "case $(cat ~/.claude/.current-profile) in *elicit*) echo 🔬;; *sociotechnica*) echo 🏗️;; *personal*) echo 🏠;; esac"
when = "test -f ~/.claude/.current-profile"
format = "[$output ]($style)"
style = ""

[character]
success_symbol = "[%](bold green)"
error_symbol = "[%](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = false
style = "bold blue"

[git_branch]
format = "[$branch]($style) "
style = "bold purple"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "yellow"
diverged = "↕"
behind = "📥"
ahead = "📤"
untracked = "🆕"
deleted = "␡"
modified = "✨"
renamed = "♻️"
stashed = "👻"
staged = "📦"
